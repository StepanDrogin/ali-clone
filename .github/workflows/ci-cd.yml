name: CI / CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - 's.drogin/**'
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Verify Netlify production after CI passes'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/market_express?schema=public'
  NUXT_PUBLIC_SITE_URL: 'https://aliclone-drogin.netlify.app'
  NUXT_PUBLIC_SUPABASE_URL: 'https://example.supabase.co'
  NUXT_PUBLIC_SUPABASE_KEY: 'ci-placeholder'
  STRIPE_PK_KEY: 'pk_test_ci_placeholder'
  STRIPE_SK_KEY: 'sk_test_ci_placeholder'

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate production env contract
        run: npm run validate:production-env
        env:
          REQUIRE_PRODUCTION_ENV: 'true'

      - name: Build and audit
        run: npm run ci:check

      - name: Verify Netlify runtime bundle
        shell: bash
        run: |
          test -f ".netlify/functions-internal/server/node_modules/.prisma/client/libquery_engine-rhel-openssl-3.0.x.so.node"
          node - <<'NODE'
          const fs = require('node:fs')
          const pkg = JSON.parse(fs.readFileSync('.netlify/functions-internal/server/node_modules/tslib/package.json', 'utf8'))
          if (JSON.stringify(pkg.exports).includes('tslib.es6.mjs')) {
            throw new Error('Netlify function bundle still references tslib.es6.mjs')
          }
          NODE

      - name: Write summary
        run: |
          {
            echo '### CI checks'
            echo ''
            echo '- Production env contract: passed with CI placeholders'
            echo '- Netlify/Nitro build: passed'
            echo '- Prisma Netlify runtime bundle: verified'
            echo '- npm audit: moderate threshold'
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Production Verify
    needs: quality
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: https://aliclone-drogin.netlify.app

    steps:
      - name: Verify production endpoints
        shell: bash
        run: |
          endpoints=(
            "https://aliclone-drogin.netlify.app/"
            "https://aliclone-drogin.netlify.app/api/health"
            "https://aliclone-drogin.netlify.app/api/prisma/get-all-products"
          )

          for attempt in {1..30}; do
            failed=0

            for endpoint in "${endpoints[@]}"; do
              if ! curl -fsS --max-time 20 "$endpoint" >/dev/null; then
                failed=1
                break
              fi
            done

            if [ "$failed" -eq 0 ]; then
              exit 0
            fi

            sleep 10
          done

          echo "::error title=Production verification failed::Netlify production endpoints did not become healthy in time."
          exit 1

      - name: Write deploy summary
        run: |
          {
            echo '### Production verification'
            echo ''
            echo '- Site: https://aliclone-drogin.netlify.app'
            echo '- Health: https://aliclone-drogin.netlify.app/api/health'
            echo '- Products API: https://aliclone-drogin.netlify.app/api/prisma/get-all-products'
          } >> "$GITHUB_STEP_SUMMARY"
